name: Sync SP-API data

on:
  schedule:
    - cron: "0 0,4,8,12,16,20 * * *"
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync script
        env:
          SP_API_REFRESH_TOKEN: ${{ secrets.SP_API_REFRESH_TOKEN }}
          SP_API_LWA_APP_ID: ${{ secrets.SP_API_LWA_APP_ID }}
          SP_API_LWA_CLIENT_SECRET: ${{ secrets.SP_API_LWA_CLIENT_SECRET }}
          SP_API_SELLER_ID: ${{ secrets.SP_API_SELLER_ID }}
          SP_API_MARKETPLACE: ${{ secrets.SP_API_MARKETPLACE }}
        run: python sync_sp_api.py

      - name: Commit updated database back to repo
        run: |
          git config user.name "sp-api-bot"
          git config user.email "bot@users.noreply.github.com"
          git add conversion.db
          git commit -m "Update conversion data $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push
